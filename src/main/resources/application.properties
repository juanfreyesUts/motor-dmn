server.port=8080
spring.application.name=dmn-sidecar

# Limite de archivo para multipart (archivos .dmn)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Silenciar logs verbose de KIE/Drools al arrancar
logging.level.org.kie=WARN
logging.level.org.drools=WARN
logging.level.com.example=INFO

# --- Actuator: health, liveness y readiness para contenedores/orquestadores ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# --- Traduccion de mensajes de validacion (Google Cloud Translation V2) ---
# Activa la traduccion. Si es false, las respuestas quedan en ingles (idioma origen).
translation.enabled=true
# Idioma en que el motor DMN emite los mensajes; no se traduce si destino == origen.
translation.source-language=en
# Idioma usado cuando el cliente no manda un Accept-Language valido.
translation.default-language=en
# Idiomas permitidos (un destino fuera de esta lista queda en ingles).
translation.supported-languages=en,es,pt,fr,de
# Cache en memoria de traducciones (mensajes de validacion se repiten mucho).
translation.cache-enabled=true
translation.cache-max-entries=5000
# Credenciales: por defecto Application Default Credentials (env GOOGLE_APPLICATION_CREDENTIALS).
# Alternativa simple (menos segura): fijar una API key.
translation.api-key=${GOOGLE_TRANSLATE_API_KEY:}

# --- Tomcat: tuning para soportar cargas altas ---
# Hilos de atencion de peticiones (ajustable por variable de entorno en prod).
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.min-spare=${TOMCAT_MIN_THREADS:20}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:10000}
# Apaga la conexion de forma ordenada al recibir SIGTERM (graceful shutdown).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
