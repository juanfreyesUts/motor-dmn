# ===================================================================
# Perfil de PRODUCCION (se activa con SPRING_PROFILES_ACTIVE=prod).
# Hereda de application.properties y sobreescribe lo necesario.
# ===================================================================

# --- Logging: mas silencioso en produccion ---
logging.level.root=WARN
logging.level.com.example=INFO
logging.level.org.kie=ERROR
logging.level.org.drools=ERROR
# Patron con marca de tiempo apto para agregadores de logs (JSON/ELK/Loki).
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# --- Actuator: minima superficie expuesta ---
# Solo health (para probes) y metricas para Prometheus. Sin detalles sensibles.
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoint.health.probes.enabled=true
# OPCIONAL (produccion avanzada): mover Actuator a un puerto separado para no
# exponerlo junto al trafico publico. Si lo activas, ACTUALIZA tambien el puerto
# del HEALTHCHECK en Dockerfile y docker-compose.yml, o quedaran en 404.
#   management.server.port=8081

# --- Tomcat: defaults mas altos en prod (siguen siendo sobreescribibles) ---
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:400}
server.tomcat.threads.min-spare=${TOMCAT_MIN_THREADS:50}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:200}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:20000}

# --- Robustez ---
# No revelar el stacktrace ni mensajes internos en respuestas de error.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
# Apagado ordenado (heredado, reafirmado aqui).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Comprime respuestas para reducir ancho de banda.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024
